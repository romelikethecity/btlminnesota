<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Registered — BTL Body &amp; Mind Experience</title>
  <link rel="icon" type="image/png" href="shared/assets/btl-icon-blue.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/css/styles.css?v=1">

<body>

  <!-- Header -->
  <header class="header">
    <div class="container header__inner">
      <a href="/"><img src="shared/assets/btl-logo-white.svg" alt="BTL Industries" class="header__logo"></a>
    </div>
  </header>

  <!-- Confirmation -->
  <section class="confirmation">
    <div class="container container--narrow">

      <!-- Success icon -->
      <div class="confirmation__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h1 class="confirmation__title">You're registered</h1>
      <p class="confirmation__subtitle" id="confirmation-subtitle">We'll see you there.</p>

      <!-- Event details summary -->
      <div style="background:var(--btl-light-bg);border-radius:var(--radius-md);padding:var(--space-lg);margin-bottom:var(--space-2xl);text-align:left;">
        <div style="display:grid;gap:var(--space-sm);">
          <div><strong>Event:</strong> <span id="conf-event-name"></span></div>
          <div><strong>Date:</strong> <span id="conf-event-date"></span></div>
          <div><strong>Time:</strong> <span id="conf-event-time"></span></div>
          <div><strong>Venue:</strong> <span id="conf-event-venue"></span></div>
          <div><strong>Address:</strong> <span id="conf-event-address"></span></div>
        </div>
        <div style="margin-top:var(--space-md);">
          <a id="conf-maps-link" href="#" target="_blank" rel="noopener" class="btn btn--secondary btn--sm">Get Directions</a>
        </div>
      </div>

      <!-- Calendar -->
      <h3 style="margin-bottom:var(--space-md);">Add to your calendar</h3>
      <div class="calendar-buttons">
        <button id="btn-gcal" class="btn btn--primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Google Calendar
        </button>
        <button id="btn-ics" class="btn btn--secondary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Download .ics
        </button>
      </div>

      <!-- Referral -->
      <div class="referral-card" style="margin-top:var(--space-2xl);">
        <h3 class="referral-card__title">Bring a colleague</h3>
        <p class="referral-card__text">Share your personalized link. Each person needs their own registration.</p>
        <div class="referral-url-box">
          <input type="text" id="referral-url" readonly aria-label="Referral URL">
          <button id="btn-copy-referral" class="btn btn--secondary btn--sm">Copy</button>
        </div>
        <div class="share-buttons">
          <a id="btn-email-share" href="#" class="btn btn--secondary btn--sm">Email</a>
          <a id="btn-sms-share" href="#" class="btn btn--secondary btn--sm">Text</a>
          <button id="btn-native-share" class="btn btn--primary btn--sm" hidden>Share</button>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <img src="shared/assets/btl-logo-white.svg" alt="BTL Industries" class="footer__logo">
      <p>BTL Industries — Medical and Aesthetics Innovations</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="shared/js/calendar.js"></script>
  <script src="shared/js/referral.js"></script>
  <script>
    // Hydrate confirmation page from sessionStorage
    document.addEventListener('DOMContentLoaded', () => {
      const data = JSON.parse(sessionStorage.getItem('btl_registration') || 'null');
      if (!data) {
        // No registration data — redirect back
        window.location.href = 'index.html';
        return;
      }

      // Personalized subtitle
      const subtitle = document.getElementById('confirmation-subtitle');
      if (subtitle && data.first_name) {
        subtitle.textContent = `${data.first_name}, we'll see you there.`;
      }

      // Event details
      const setEl = (id, text) => {
        const el = document.getElementById(id);
        if (el) el.textContent = text;
      };

      setEl('conf-event-name', data.event_name);
      setEl('conf-event-venue', data.event_venue);
      setEl('conf-event-address', data.event_address);

      // Format date
      if (data.event_date) {
        const d = new Date(data.event_date + 'T12:00:00');
        setEl('conf-event-date', d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }));
      }

      // Format time
      if (data.event_time_start && data.event_time_end) {
        const fmt = (t) => {
          const [h, m] = t.split(':').map(Number);
          const ampm = h >= 12 ? 'PM' : 'AM';
          const hour = h > 12 ? h - 12 : h === 0 ? 12 : h;
          return `${hour}:${m.toString().padStart(2, '0')} ${ampm}`;
        };
        setEl('conf-event-time', `${fmt(data.event_time_start)} – ${fmt(data.event_time_end)}`);
      }

      // Maps link
      const mapsLink = document.getElementById('conf-maps-link');
      if (mapsLink && data.event_maps_url) {
        mapsLink.href = data.event_maps_url;
      }
    });
  </script>

</body>
</html>
